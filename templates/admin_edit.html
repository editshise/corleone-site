<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактировать карточку | Corleone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: #0a0a0a;
    color: white;
    font-family: Inter, sans-serif;
}

.page {
    width: min(620px, 100%);
    margin: 0 auto;
    padding: 18px;
}

.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
}

h1 {
    margin: 0;
    font-size: 24px;
}

a {
    color: #ddd;
    text-decoration: none;
    font-size: 13px;
}

.panel {
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    background: #111;
    box-shadow: 0 18px 44px rgba(0,0,0,0.28);
}

.preview {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    border-radius: 14px;
    margin-bottom: 14px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
}

label {
    display: grid;
    gap: 7px;
    color: #aaa;
    font-size: 12px;
}

input,
select,
textarea,
button {
    width: 100%;
    border: none;
    border-radius: 14px;
    font: inherit;
}

input,
select,
textarea {
    padding: 12px;
    background: #222;
    color: white;
    outline: none;
}

textarea {
    min-height: 110px;
    resize: vertical;
}

.wide {
    grid-column: span 2;
}

button {
    margin-top: 12px;
    padding: 13px;
    background: linear-gradient(90deg,#7c3aed,#ff2bd6);
    color: white;
    font-weight: 800;
    cursor: pointer;
}

@media (max-width: 560px) {
    .grid {
        grid-template-columns: 1fr;
    }

    .wide {
        grid-column: span 1;
    }
}
</style>
</head>
<body>
<main class="page">
    <div class="top">
        <h1>Редактировать</h1>
        <a href="/admin">Назад</a>
    </div>

    <form class="panel" method="post" enctype="multipart/form-data">
        <img class="preview" src="{{ card.image_src|image_src }}" alt="{{ card.title }}">
        <div class="grid">
            <label>
                Раздел
                <select name="section">
                    <option value="pmr_exchange" {% if card.section == 'pmr_exchange' %}selected{% endif %}>ПМР — Обменники</option>
                    <option value="pmr_shop" {% if card.section == 'pmr_shop' %}selected{% endif %}>ПМР — Магазины</option>
                    <option value="md_exchange" {% if card.section == 'md_exchange' %}selected{% endif %}>Молдова — Обменники</option>
                    <option value="md_shop" {% if card.section == 'md_shop' %}selected{% endif %}>Магазины-Молдова</option>
                    <option value="ua_exchange" {% if card.section == 'ua_exchange' %}selected{% endif %}>Украина — Обменники</option>
                    <option value="ua_shop" {% if card.section == 'ua_shop' %}selected{% endif %}>Украина — Магазины</option>
                    <option value="services" {% if card.section == 'services' %}selected{% endif %}>Разные услуги</option>
                </select>
            </label>
            <label>
                Новое фото, если нужно
                <input type="file" name="image" accept="image/*">
            </label>
            <label>
                Имя карточки
                <input name="title" value="{{ card.title }}" required>
            </label>
            <label>
                Ссылка
                <input name="link" value="{{ card.link }}" required>
            </label>
            <label class="wide">
                Описание
                <textarea name="description" required>{{ card.description }}</textarea>
            </label>
        </div>
        <button>Сохранить изменения</button>
    </form>
</main>
</body>
</html>
