<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ | Corleone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #0a0a0a;
    color: white;
    font-family: Inter, sans-serif;
}

.box {
    width: min(360px, calc(100% - 30px));
    padding: 28px;
    border-radius: 18px;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 48px rgba(0,0,0,0.36);
}

h1 {
    margin: 0 0 18px;
    font-size: 24px;
}

input,
button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 14px;
    font: inherit;
}

input {
    margin-bottom: 12px;
    background: #222;
    color: white;
    outline: none;
}

button {
    background: linear-gradient(90deg,#7c3aed,#ff2bd6);
    color: white;
    font-weight: 800;
    cursor: pointer;
}

.error {
    margin-bottom: 12px;
    color: #fca5a5;
    font-size: 13px;
}

a {
    display: block;
    margin-top: 14px;
    color: #aaa;
    text-align: center;
    text-decoration: none;
    font-size: 13px;
}
</style>
</head>
<body>
<form class="box" method="post">
    <h1>Админ-панель</h1>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <input type="password" name="password" placeholder="Пароль" required>
    <button>Войти</button>
    <a href="/">На главную</a>
</form>
</body>
</html>
